<div class="card">
  <div class="card-body p-0">
    <div class="table-responsive">
      <table class="table table-sm table-striped align-middle mb-0">
        <thead>
          <tr>
            <th title="Unique Device Name for HomeAssistant">ID ⓘ</th>
            <th title="Internal administrative name for the device">Name ⓘ</th>
            <th title="Device Location passed through to HomeAssistant">Location ⓘ</th>
            <th title="DNS or IP address of the polling target">Host ⓘ</th>
            <th title="Polling profile dataset forwarded to HomeAssistant">PROFILE ⓘ</th>
            <th title="Global or Local profile mode. Local mode allows temporary or device-specific adjustments without creating a new profile.">Mode ⓘ</th>
            <th title="Enable device logging for debugging">Logging ⓘ</th>
            <th title="For TCP drivers, default behavior opens a new session per call. Keep-Conn retains a long-lived individual connection.">Keep Conn ⓘ</th>
            <th title="V1 uses multi-stage full block polling. V2 reduces polling to a minimal register set when supported by the device.">Optimised ⓘ</th>
            <th title="MQTT Discovery deploys the device to HomeAssistant. Disabling discovery removes it from HomeAssistant.">Discovery ⓘ</th>
            <th title="Enable or disable this device in the polling rotation">Polling ⓘ</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody>
          {% for device in devices %}
            {% include "htmx/device_row.html" %}
          {% else %}
            <tr><td colspan="12" class="text-muted p-3">No devices configured.</td></tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
</div>
