<div class="position-fixed top-0 end-0 p-3" style="z-index: 1095; width: min(420px, 96vw); pointer-events: none;">
  <template x-for="toast in toasts" :key="toast.id">
    <div class="alert d-flex justify-content-between align-items-start shadow-sm mb-2"
         style="pointer-events: auto;"
         :class="{
           'alert-success': toast.level === 'success',
           'alert-danger': toast.level === 'danger',
           'alert-warning': toast.level === 'warning',
           'alert-info': !['success','danger','warning'].includes(toast.level)
         }"
    >
      <div class="pe-2" x-text="toast.message"></div>
      <button type="button" class="btn-close btn-sm" @click="removeToast(toast.id)"></button>
    </div>
  </template>
</div>
