services:
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: ups2mqtt-ha-test-homeassistant
    restart: unless-stopped
    depends_on:
      - mqtt
    environment:
      TZ: ${HA_TEST_TZ:-UTC}
    ports:
      - "${HA_TEST_HTTP_BIND:-127.0.0.1}:${HA_TEST_HTTP_PORT:-8123}:8123"
    volumes:
      - ha_test_config:/config

  mqtt:
    image: eclipse-mosquitto:2
    container_name: ups2mqtt-ha-test-mqtt
    restart: unless-stopped
    command:
      - sh
      - -c
      - |
        printf '%s\n' \
          'listener 1883 0.0.0.0' \
          'allow_anonymous true' \
          'persistence true' \
          'persistence_location /mosquitto/data/' \
          'log_dest stdout' > /tmp/mosquitto.conf
        exec mosquitto -c /tmp/mosquitto.conf
    ports:
      - "${HA_TEST_MQTT_BIND:-127.0.0.1}:${HA_TEST_MQTT_PORT:-1883}:1883"
    volumes:
      - ha_test_mosquitto_data:/mosquitto/data
      - ha_test_mosquitto_log:/mosquitto/log

volumes:
  ha_test_config:
  ha_test_mosquitto_data:
  ha_test_mosquitto_log:
