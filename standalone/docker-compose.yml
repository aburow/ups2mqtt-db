---

services:
  ups2mqtt:
    build:
      context: ..
      dockerfile: standalone/Dockerfile
    container_name: ups2mqtt
    restart: unless-stopped
    ports:
      - "${UPS2MQTT_ADMIN_BIND:-0.0.0.0}:${UPS2MQTT_ADMIN_PORT:-8099}:8099"
      - "${UPS2MQTT_METRICS_BIND:-0.0.0.0}:${UPS2MQTT_METRICS_PORT:-8100}:8100"
    environment:
      UPS2MQTT_MQTT_HOST: ${UPS2MQTT_MQTT_HOST:-}
      UPS2MQTT_MQTT_PORT: ${UPS2MQTT_MQTT_PORT:-1883}
      UPS2MQTT_MQTT_USERNAME: ${UPS2MQTT_MQTT_USERNAME:-}
      UPS2MQTT_MQTT_PASSWORD: ${UPS2MQTT_MQTT_PASSWORD:-}
      UPS2MQTT_HA_URL: ${UPS2MQTT_HA_URL:-}
      UPS2MQTT_HA_TOKEN: ${UPS2MQTT_HA_TOKEN:-}
      UPS2MQTT_TELEMETRY_INFLUX_ENABLED: >-
        ${UPS2MQTT_TELEMETRY_INFLUX_ENABLED:-false}
      UPS2MQTT_TELEMETRY_INFLUX_URL: ${UPS2MQTT_TELEMETRY_INFLUX_URL:-}
      UPS2MQTT_TELEMETRY_INFLUX_API: ${UPS2MQTT_TELEMETRY_INFLUX_API:-v3}
      UPS2MQTT_TELEMETRY_INFLUX_DATABASE: >-
        ${UPS2MQTT_TELEMETRY_INFLUX_DATABASE:-}
      UPS2MQTT_TELEMETRY_INFLUX_TOKEN: ${UPS2MQTT_TELEMETRY_INFLUX_TOKEN:-}
      UPS2MQTT_TELEMETRY_INFLUX_MEASUREMENT: >-
        ${UPS2MQTT_TELEMETRY_INFLUX_MEASUREMENT:-ups2mqtt}
      UPS2MQTT_TELEMETRY_INFLUX_TIMEOUT_SECONDS: >-
        ${UPS2MQTT_TELEMETRY_INFLUX_TIMEOUT_SECONDS:-2.0}
      UPS2MQTT_TELEMETRY_INFLUX_QUEUE_SIZE: >-
        ${UPS2MQTT_TELEMETRY_INFLUX_QUEUE_SIZE:-1000}
      UPS2MQTT_TELEMETRY_INFLUX_FLUSH_INTERVAL_SECONDS: >-
        ${UPS2MQTT_TELEMETRY_INFLUX_FLUSH_INTERVAL_SECONDS:-5.0}
      UPS2MQTT_TELEMETRY_INFLUX_BATCH_MAX_POINTS: >-
        ${UPS2MQTT_TELEMETRY_INFLUX_BATCH_MAX_POINTS:-500}
      UPS2MQTT_TELEMETRY_INFLUX_ACCEPT_PARTIAL: >-
        ${UPS2MQTT_TELEMETRY_INFLUX_ACCEPT_PARTIAL:-true}
      UPS2MQTT_LOG_LEVEL: ${UPS2MQTT_LOG_LEVEL:-ERROR}
      UPS2MQTT_MAX_CONCURRENT_POLLS: ${UPS2MQTT_MAX_CONCURRENT_POLLS:-}
      UPS2MQTT_ADAPTIVE_CONCURRENCY_ENABLED: >-
        ${UPS2MQTT_ADAPTIVE_CONCURRENCY_ENABLED:-}
      UPS2MQTT_ADAPTIVE_CONCURRENCY_MIN: ${UPS2MQTT_ADAPTIVE_CONCURRENCY_MIN:-}
      UPS2MQTT_ADAPTIVE_CONCURRENCY_MAX: ${UPS2MQTT_ADAPTIVE_CONCURRENCY_MAX:-}
      UPS2MQTT_ADAPTIVE_CONCURRENCY_WINDOW_SECONDS: >-
        ${UPS2MQTT_ADAPTIVE_CONCURRENCY_WINDOW_SECONDS:-}
      UPS2MQTT_ADAPTIVE_CONCURRENCY_TARGET_P95_WAIT_MS: >-
        ${UPS2MQTT_ADAPTIVE_CONCURRENCY_TARGET_P95_WAIT_MS:-}
      UPS2MQTT_MODBUS_OPTIMIZER_V2_DRY_RUN: >-
        ${UPS2MQTT_MODBUS_OPTIMIZER_V2_DRY_RUN:-}
      UPS2MQTT_MODBUS_OPTIMIZER_V2_POLICY: >-
        ${UPS2MQTT_MODBUS_OPTIMIZER_V2_POLICY:-}
      UPS2MQTT_MODBUS_OPTIMIZER_V2_DISPATCH: >-
        ${UPS2MQTT_MODBUS_OPTIMIZER_V2_DISPATCH:-}
      UPS2MQTT_MODBUS_OPTIMIZER_V2_DISABLED_DEVICES: >-
        ${UPS2MQTT_MODBUS_OPTIMIZER_V2_DISABLED_DEVICES:-}
      UPS_AUDIT_SYSLOG_ENABLED: ${UPS_AUDIT_SYSLOG_ENABLED:-false}
      UPS_AUDIT_SYSLOG_HOST: ${UPS_AUDIT_SYSLOG_HOST:-127.0.0.1}
      UPS_AUDIT_SYSLOG_PORT: ${UPS_AUDIT_SYSLOG_PORT:-514}
      DISABLE_PROFILE_PROTECTION: ${DISABLE_PROFILE_PROTECTION:-}
    volumes:
      - ./options.json:/usr/src/app/options.json:ro
      - ./data:/data
      - ../../apc-modbus-ha:/apps/apc-modbus-ha:ro
      - ../../ups-snmp-ha:/apps/ups-snmp-ha:ro
      - ../../cyberpower-modbus-ha:/apps/cyberpower-modbus-ha:ro

  caddy:
    image: caddy:2-alpine
    container_name: ups2mqtt-caddy
    restart: unless-stopped
    depends_on:
      - ups2mqtt
    ports:
      - "${UPS2MQTT_PROXY_HTTP_PORT:-8080}:80"
      - "${UPS2MQTT_PROXY_HTTPS_PORT:-8443}:443"
    environment:
      UPS2MQTT_PROXY_HOSTNAME: ${UPS2MQTT_PROXY_HOSTNAME:-ups2mqtt.local}
      UPS2MQTT_PROXY_USERNAME: ${UPS2MQTT_PROXY_USERNAME:-admin}
      UPS2MQTT_PROXY_PASSWORD_HASH: >-
        ${UPS2MQTT_PROXY_PASSWORD_HASH:-$$2a$$14$$x784qDqIEqHfNoZu6tZvhOwGlnKjPv2QyWPTcuPgdF/O/Fumtk/ma}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
