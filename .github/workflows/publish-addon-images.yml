name: Publish Home Assistant add-on images

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Image tag to publish, for example 1.2.10. Defaults to the tag name without v."
        required: false
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-addon-images-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish ${{ matrix.addon_arch }} image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - addon_arch: amd64
            platform: linux/amd64
          - addon_arch: aarch64
            platform: linux/arm64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve image version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.version }}" ]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF_NAME#v}"
          fi
          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid image version: $version" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push add-on image
        uses: docker/build-push-action@v6
        with:
          context: homeassistant-addon/ups2mqtt
          file: homeassistant-addon/ups2mqtt/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          pull: true
          tags: ghcr.io/aburow/${{ matrix.addon_arch }}-addon-ups2mqtt:${{ steps.version.outputs.version }}
          labels: |
            org.opencontainers.image.source=https://github.com/aburow/ups2mqtt-db
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            io.hass.name=ups2mqtt
            io.hass.version=${{ steps.version.outputs.version }}
            io.hass.arch=${{ matrix.addon_arch }}
            io.hass.type=addon
          build-args: |
            BUILD_VERSION=${{ steps.version.outputs.version }}
            BUILD_ARCH=${{ matrix.addon_arch }}
